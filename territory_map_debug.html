<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Victoria Territory Map</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body { font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif; display:flex; height:100vh; overflow:hidden; background:#1a1a2e; color:#eee; }
#map { flex:1; }
#sidebar { width:340px; min-width:340px; background:#16213e; display:flex; flex-direction:column; border-left:1px solid #0f3460; overflow:hidden; }
#sidebar-header { padding:14px 16px; background:#0f3460; border-bottom:1px solid #1a1a2e; flex-shrink:0; }
#sidebar-header h1 { font-size:15px; font-weight:700; color:#e94560; margin-bottom:4px; }
.stat-pill { display:inline-block; background:#1a1a2e; padding:2px 8px; border-radius:10px; font-size:11px; color:#aaa; margin-right:4px; margin-top:4px; }
#search-wrap { margin-top:10px; position:relative; }
#search { width:100%; padding:8px 12px 8px 30px; border-radius:6px; border:1px solid #0f3460; background:#1a1a2e; color:#eee; font-size:13px; outline:none; }
#search:focus { border-color:#e94560; }
.si { position:absolute; left:10px; top:50%; transform:translateY(-50%); color:#aaa; pointer-events:none; }
#search-results { position:absolute; top:100%; left:0; right:0; background:#0f3460; border:1px solid #1a1a2e; border-radius:0 0 6px 6px; z-index:1000; max-height:200px; overflow-y:auto; display:none; }
.sr-item { padding:8px 12px; cursor:pointer; font-size:12px; border-bottom:1px solid rgba(255,255,255,0.05); }
.sr-item:hover { background:#e94560; }
.sr-type { font-size:10px; color:#aaa; }
#mode-bar { display:flex; border-bottom:1px solid #0f3460; flex-shrink:0; }
.mode-btn { flex:1; padding:9px; font-size:12px; font-weight:600; cursor:pointer; border:none; background:transparent; color:#aaa; border-bottom:2px solid transparent; transition:all 0.2s; }
.mode-btn.active { color:#e94560; border-bottom-color:#e94560; background:rgba(233,69,96,0.06); }
.mode-btn:hover:not(.active) { color:#eee; background:rgba(255,255,255,0.04); }
#legend { padding:12px 16px; border-bottom:1px solid #0f3460; flex-shrink:0; }
#legend h3 { font-size:11px; text-transform:uppercase; letter-spacing:1px; color:#aaa; margin-bottom:8px; }
.rep-row { display:flex; align-items:center; gap:8px; padding:4px 6px; cursor:pointer; border-radius:4px; transition:opacity 0.2s; }
.rep-row:hover { background:rgba(255,255,255,0.05); }
.rep-row.dimmed { opacity:0.3; }
.rep-dot { width:12px; height:12px; border-radius:50%; flex-shrink:0; }
.rep-name { font-size:12px; flex:1; }
.rep-count { font-size:11px; color:#aaa; }
#view-panel { flex:1; overflow-y:auto; padding:16px; display:block; }
#edit-panel { flex:1; overflow-y:auto; padding:16px; display:none; }
.placeholder { color:#555; font-size:13px; text-align:center; margin-top:40px; line-height:1.8; }
#view-panel h2, #edit-panel h2 { font-size:15px; font-weight:700; margin-bottom:6px; }
.rep-badge { display:inline-block; padding:2px 10px; border-radius:12px; font-size:11px; font-weight:600; margin:2px 2px 6px 0; }
.shared-tag { font-size:11px; color:#FFD700; margin-bottom:8px; }
.section-label { font-size:11px; text-transform:uppercase; letter-spacing:1px; color:#aaa; margin:12px 0 6px; }
.customer-item { font-size:12px; padding:5px 8px; border-radius:4px; margin-bottom:3px; background:#1a1a2e; }
.top-sale { font-size:10px; color:#FFD700; margin-top:2px; }
.ep-suburb-title { font-size:15px; font-weight:700; margin-bottom:4px; }
.ep-rep-row { display:flex; align-items:center; gap:8px; margin-bottom:4px; }
.ep-rep-badge { padding:2px 10px; border-radius:12px; font-size:11px; font-weight:600; }
.ep-section { font-size:11px; text-transform:uppercase; letter-spacing:1px; color:#aaa; margin:14px 0 8px; }
.ep-customer-row { display:flex; align-items:center; gap:6px; margin-bottom:6px; background:#1a1a2e; border-radius:6px; padding:6px 8px; }
.ep-customer-name { flex:1; font-size:12px; }
.ep-customer-rep { font-size:10px; color:#aaa; margin-top:2px; }
.ep-customer-sale { font-size:10px; color:#FFD700; margin-top:2px; }
.ep-btn { border:none; border-radius:4px; cursor:pointer; font-size:11px; font-weight:600; padding:4px 8px; }
.ep-btn-edit { background:#0f3460; color:#eee; }
.ep-btn-edit:hover { background:#1a4a80; }
.ep-btn-del { background:rgba(233,69,96,0.2); color:#e94560; }
.ep-btn-del:hover { background:rgba(233,69,96,0.4); }
.ep-btn-save { background:#e94560; color:#fff; }
.ep-btn-save:hover { background:#c73550; }
.ep-btn-cancel { background:#333; color:#aaa; }
.ep-input { background:#1a1a2e; border:1px solid #0f3460; border-radius:5px; color:#eee; font-size:12px; padding:6px 10px; outline:none; width:100%; }
.ep-input:focus { border-color:#e94560; }
.ep-select { background:#1a1a2e; border:1px solid #0f3460; border-radius:5px; color:#eee; font-size:12px; padding:6px 10px; outline:none; width:100%; }
.ep-select:focus { border-color:#e94560; }
.ep-reassign-section { margin-top:14px; padding:12px; background:#1a1a2e; border-radius:8px; border:1px solid #0f3460; }
.ep-reassign-section h4 { font-size:12px; color:#aaa; margin-bottom:8px; }
.inline-edit { background:#0f3460; border-radius:6px; padding:10px; margin-bottom:6px; }
.inline-edit-row { display:flex; gap:6px; margin-bottom:6px; align-items:center; }
.inline-edit-row label { font-size:11px; color:#aaa; width:70px; flex-shrink:0; }
#venue-controls { padding:0 16px 10px; flex-shrink:0; display:none; }
#venue-btn { width:100%; padding:8px; background:#1a4a80; color:#eee; border:none; border-radius:6px; font-size:12px; font-weight:600; cursor:pointer; margin-bottom:6px; }
#venue-btn:hover { background:#2060a0; }
#venue-btn:disabled { background:#333; color:#666; cursor:default; }
#clear-venues-btn { display:none; width:100%; padding:6px; background:rgba(233,69,96,0.15); color:#e94560; border:1px solid rgba(233,69,96,0.3); border-radius:6px; font-size:11px; cursor:pointer; }
#clear-venues-btn:hover { background:rgba(233,69,96,0.3); }
.venue-dot { width:14px; height:14px; background:#e94560; border:2px solid #fff; border-radius:50%; cursor:pointer; transition:transform 0.15s; }
.venue-dot:hover { transform:scale(1.4); }
.venue-popup { font-size:12px; line-height:1.5; min-width:180px; }
.venue-popup strong { font-size:13px; display:block; margin-bottom:2px; }
.venue-popup .vtype { color:#888; font-size:11px; }
.venue-popup .vrating { color:#FFD700; font-size:11px; margin-top:2px; }
#save-bar { background:#0f3460; border-top:1px solid #e94560; padding:10px 16px; display:none; align-items:center; gap:8px; flex-shrink:0; }
#save-bar span { flex:1; font-size:12px; color:#FFD700; }
#save-bar button { border:none; border-radius:6px; padding:8px 16px; font-size:12px; font-weight:600; cursor:pointer; }
#btn-download { background:#e94560; color:#fff; }
#btn-discard { background:#333; color:#aaa; }
#loader { position:fixed; inset:0; background:#1a1a2e; display:flex; flex-direction:column; align-items:center; justify-content:center; z-index:9999; gap:12px; }
#loader h2 { color:#e94560; }
#loader p { color:#aaa; font-size:13px; text-align:center; max-width:300px; }
.spinner { width:40px; height:40px; border:3px solid #0f3460; border-top-color:#e94560; border-radius:50%; animation:spin 0.8s linear infinite; }
@keyframes spin { to { transform:rotate(360deg); } }
#debug-bar { position:fixed; bottom:0; left:0; right:0; background:rgba(0,0,0,0.85); color:#0f0; font-size:11px; font-family:monospace; padding:4px 12px; z-index:9998; display:none; }
</style>
</head>
<body>

<div id="loader">
  <div class="spinner"></div>
  <h2>Loading Territory Map</h2>
  <p>Fetching Victoria suburb boundaries…<br><small style="color:#555;margin-top:6px;display:block">Requires internet connection</small></p>
</div>

<div id="map"></div>

<div id="sidebar">
  <div id="sidebar-header">
    <h1>🗺 Victoria Territory Map</h1>
    <div id="stats-line"><span class="stat-pill">Loading…</span></div>
    <div id="search-wrap">
      <span class="si">⌕</span>
      <input type="text" id="search" placeholder="Search suburb or customer…" autocomplete="off">
      <div id="search-results"></div>
    </div>
  </div>

  <div id="mode-bar">
    <button class="mode-btn active" id="btn-view-mode" onclick="setMode('view')">👁 View</button>
    <button class="mode-btn" id="btn-edit-mode" onclick="setMode('edit')">✏️ Edit</button>
  </div>

  <div id="legend">
    <h3>Sales Reps <small style="font-size:10px;font-weight:normal;color:#555">(click to toggle)</small></h3>
    <div id="rep-list"></div>
  </div>

  <div id="view-panel">
    <div class="placeholder">🖱 Hover a suburb to preview<br>Click to pin &amp; edit</div>
  </div>

  <div id="edit-panel">
    <div class="ep-placeholder" style="color:#555;font-size:13px;text-align:center;margin-top:40px">✏️ Click any suburb on the map<br>to edit its details</div>
  </div>

  <div id="venue-controls">
    <button id="venue-btn" onclick="findVenues()">🔍 Find nearby venues</button>
    <button id="clear-venues-btn" onclick="clearVenues()">✕ Clear venue dots</button>
  </div>

  <div id="save-bar">
    <span>⚠ Unsaved changes</span>
    <button id="btn-discard" onclick="discardChanges()">Discard</button>
    <button id="btn-download" onclick="downloadMap()">💾 Download Updated Map</button>
  </div>
</div>

<div id="debug-bar"></div>

const REP_COLORS = {"Jason O'Brien": "#2196F3", "Martin Kelliher": "#4CAF50", "Angelo Giacobbe": "#FF5722", "Brad Armstrong": "#9C27B0", "Leanne Grigg": "#FF9800", "Gaby McIntosh": "#00BCD4", "House Account": "#795548", "Gerard Ballantyne": "#E91E63", "Trudi Alcock": "#607D8B", "Katharine Butterworth": "#FFEB3B", "Robert Guerrini": "#FFFFFF"};

let data = JSON.parse(JSON.stringify(SUBURB_DATA));
let hasChanges = false;
let currentMode = 'view';
let selectedLayer = null;
let activeSuburbKey = null;
const allLayers = {};
const dimmed = new Set();

function buildLookup() {
  const lk = {};
  for (const [k, v] of Object.entries(data)) {
    lk[k.toUpperCase()] = { ...v, displayName: k };
  }
  return lk;
}
let lookup = buildLookup();

// ── MAP ───────────────────────────────────────────────────────────────────────
const map = L.map('map', { center: [-37.0, 144.5], zoom: 7 });
L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
  attribution:'© OpenStreetMap © CARTO', maxZoom:19
}).addTo(map);

function repColor(rep) { return REP_COLORS[rep] || '#888'; }
function repTextColor(rep) {
  const col = REP_COLORS[rep] || '#888';
  return (col === '#FFFFFF' || col === '#FFEB3B' || col === '#FFD700') ? '#111' : '#fff';
}

function styleFor(info, hover, selected) {
  const col = repColor(info.reps[0]);
  const isShared = info.reps.length > 1;
  const isDimmed = info.reps.every(r => dimmed.has(r));
  if (isDimmed) return { fillOpacity:0.05, opacity:0.15, fillColor:col, color:'#444', weight:0.5 };
  return {
    fillColor: col,
    fillOpacity: selected ? 0.9 : hover ? 0.78 : 0.62,
    color: isShared ? '#FFD700' : (selected || hover ? '#fff' : col),
    weight: isShared ? 2.5 : selected ? 2.5 : hover ? 2 : 1,
    dashArray: isShared ? '6,3' : null
  };
}

function getSuburbName(props) {
  return props.vic_loca_2 || props.SSC_NAME || props.SSC_NAME16 ||
         props.SAL_NAME21 || props.name || props.Name ||
         props.LOCALITY || props.suburb || props.SUBURB || '';
}

// ── MODE ──────────────────────────────────────────────────────────────────────
function setMode(mode) {
  currentMode = mode;
  document.getElementById('btn-view-mode').classList.toggle('active', mode === 'view');
  document.getElementById('btn-edit-mode').classList.toggle('active', mode === 'edit');
  document.getElementById('view-panel').style.display = mode === 'view' ? 'block' : 'none';
  document.getElementById('edit-panel').style.display = mode === 'edit' ? 'block' : 'none';
}

// ── VIEW PANEL ────────────────────────────────────────────────────────────────
function renderViewPanel(info) {
  const panel = document.getElementById('view-panel');
  const isShared = info.reps.length > 1;
  const byRep = {};
  for (const c of info.customers) (byRep[c.rep] = byRep[c.rep] || []).push(c);
  let html = `<h2>${info.displayName}</h2>`;
  for (const rep of info.reps) {
    html += `<span class="rep-badge" style="background:${repColor(rep)};color:${repTextColor(rep)}">${rep}</span>`;
  }
  if (isShared) html += `<div class="shared-tag">⚠ Shared territory</div>`;
  const total = info.customers.length;
  html += `<div class="section-label">${total} Customer${total !== 1 ? 's' : ''}</div>`;
  for (const rep of info.reps) {
    const custs = byRep[rep] || [];
    if (isShared && custs.length) html += `<div style="font-size:11px;color:${repColor(rep) === '#FFFFFF' ? '#aaa' : repColor(rep)};font-weight:600;margin:8px 0 4px">${rep}</div>`;
    for (const c of custs) {
      html += `<div class="customer-item">${c.name}${c.topSale ? `<div class="top-sale">⭐ ${c.topSale}</div>` : ''}</div>`;
    }
  }
  panel.innerHTML = html;
}

function clearViewPanel() {
  if (!selectedLayer) {
    document.getElementById('view-panel').innerHTML = '<div class="placeholder">🖱 Hover a suburb to preview<br>Click to pin &amp; edit</div>';
  }
}

// ── EDIT PANEL ────────────────────────────────────────────────────────────────
function renderEditPanel(key) {
  const panel = document.getElementById('edit-panel');
  const info = lookup[key];
  if (!info) { panel.innerHTML = '<div style="color:#555;font-size:13px;text-align:center;margin-top:40px">✏️ Click any suburb on the map<br>to edit its details</div>'; return; }
  const allReps = Object.keys(REP_COLORS);
  let html = `<div class="ep-suburb-title">${info.displayName}</div>`;
  html += `<div class="ep-section">Territory Rep(s)</div>`;
  html += `<div class="ep-reassign-section"><h4>Assigned to:</h4>`;
  for (const rep of info.reps) {
    html += `<div class="ep-rep-row">
      <span class="ep-rep-badge" style="background:${repColor(rep)};color:${repTextColor(rep)}">${rep}</span>
      ${info.reps.length > 1 ? `<button class="ep-btn ep-btn-del" onclick="removeRepFromSuburb('${key}','${rep.replace(/'/g, "\'")}')" >Remove</button>` : ''}
    </div>`;
  }
  html += `<div style="display:flex;gap:6px;margin-top:8px">
    <select id="ep-add-rep-sel" class="ep-select">
      <option value="">Add rep…</option>
      ${allReps.filter(r => !info.reps.includes(r)).map(r => `<option value="${r}">${r}</option>`).join('')}
    </select>
    <button class="ep-btn ep-btn-save" onclick="addRepToSuburb('${key}')">Add</button>
  </div></div>`;
  html += `<div class="ep-section">Customers (${info.customers.length})</div>`;
  info.customers.forEach((c, i) => {
    html += `<div class="ep-customer-row" id="cust-row-${i}">
      <div style="flex:1">
        <div class="ep-customer-name">${c.name}</div>
        <div class="ep-customer-rep" style="color:${repColor(c.rep) === '#FFFFFF' ? '#aaa' : repColor(c.rep)}">${c.rep}</div>
        ${c.topSale ? `<div class="ep-customer-sale">⭐ ${c.topSale}</div>` : ''}
      </div>
      <button class="ep-btn ep-btn-edit" onclick="editCustomer('${key}',${i})" title="Edit">✏</button>
      <button class="ep-btn ep-btn-del" onclick="deleteCustomer('${key}',${i})" title="Remove">✕</button>
    </div>`;
  });
  html += `<div class="ep-section">Add Customer</div>
  <div class="inline-edit">
    <div class="inline-edit-row"><label for="ep-new-name">Name</label><input id="ep-new-name" class="ep-input" placeholder="Customer name…"></div>
    <div class="inline-edit-row"><label for="ep-new-rep">Rep</label>
      <select id="ep-new-rep" class="ep-select">
        ${allReps.map(r => `<option value="${r}" ${info.reps[0]===r?'selected':''}>${r}</option>`).join('')}
      </select>
    </div>
    <div class="inline-edit-row"><label for="ep-new-sale">Top Sale</label><input id="ep-new-sale" class="ep-input" placeholder="e.g. Penfolds Grange (optional)"></div>
    <button class="ep-btn ep-btn-save" style="width:100%;margin-top:4px" onclick="addCustomer('${key}')">+ Add Customer</button>
  </div>`;
  panel.innerHTML = html;
}

// ── EDIT ACTIONS ──────────────────────────────────────────────────────────────
function markChanged() {
  hasChanges = true;
  document.getElementById('save-bar').style.display = 'flex';
  lookup = buildLookup();
}

function deleteCustomer(key, idx) {
  if (!confirm('Remove this customer?')) return;
  data[key].customers.splice(idx, 1);
  markChanged(); refreshLayer(key); renderEditPanel(key);
}

function editCustomer(key, idx) {
  const c = data[key].customers[idx];
  const allReps = Object.keys(REP_COLORS);
  const row = document.getElementById(`cust-row-${idx}`);
  row.innerHTML = `
    <div style="flex:1">
      <div class="inline-edit-row"><label for="ec-name-${idx}">Name</label><input id="ec-name-${idx}" class="ep-input" value="${c.name.replace(/"/g,'&quot;')}"></div>
      <div class="inline-edit-row"><label for="ec-rep-${idx}">Rep</label>
        <select id="ec-rep-${idx}" class="ep-select">
          ${allReps.map(r => `<option value="${r}" ${c.rep===r?'selected':''}>${r}</option>`).join('')}
        </select>
      </div>
      <div class="inline-edit-row"><label for="ec-sale-${idx}">Top Sale</label><input id="ec-sale-${idx}" class="ep-input" value="${c.topSale||''}" placeholder="e.g. Penfolds Grange"></div>
    </div>
    <div style="display:flex;flex-direction:column;gap:4px">
      <button class="ep-btn ep-btn-save" onclick="saveCustomerEdit('${key}',${idx})">✓</button>
      <button class="ep-btn ep-btn-cancel" onclick="renderEditPanel('${key}')">✕</button>
    </div>`;
}

function saveCustomerEdit(key, idx) {
  const name = document.getElementById(`ec-name-${idx}`).value.trim();
  const rep = document.getElementById(`ec-rep-${idx}`).value;
  const sale = document.getElementById(`ec-sale-${idx}`).value.trim();
  if (!name) { alert('Customer name cannot be empty'); return; }
  data[key].customers[idx] = { name, rep, ...(sale ? { topSale: sale } : {}) };
  if (!data[key].reps.includes(rep)) data[key].reps.push(rep);
  markChanged(); refreshLayer(key); renderEditPanel(key);
}

function addCustomer(key) {
  const name = document.getElementById('ep-new-name').value.trim();
  const rep = document.getElementById('ep-new-rep').value;
  const sale = document.getElementById('ep-new-sale').value.trim();
  if (!name) { alert('Please enter a customer name'); return; }
  const entry = { name, rep, ...(sale ? { topSale: sale } : {}) };
  data[key].customers.push(entry);
  if (!data[key].reps.includes(rep)) data[key].reps.push(rep);
  markChanged(); refreshLayer(key); renderEditPanel(key);
}

function addRepToSuburb(key) {
  const rep = document.getElementById('ep-add-rep-sel').value;
  if (!rep) return;
  if (!data[key].reps.includes(rep)) data[key].reps.push(rep);
  markChanged(); refreshLayer(key); renderEditPanel(key);
}

function removeRepFromSuburb(key, rep) {
  if (data[key].reps.length <= 1) { alert('A suburb must have at least one rep.'); return; }
  data[key].reps = data[key].reps.filter(r => r !== rep);
  markChanged(); refreshLayer(key); renderEditPanel(key);
}

function refreshLayer(key) {
  lookup = buildLookup();
  const layer = allLayers[key];
  if (layer) {
    const info = lookup[key];
    if (info) layer.setStyle(styleFor(info, false, selectedLayer === layer));
  }
}

// ── SAVE / DOWNLOAD ───────────────────────────────────────────────────────────
function discardChanges() {
  if (!confirm('Discard all unsaved changes?')) return;
  data = JSON.parse(JSON.stringify(SUBURB_DATA));
  lookup = buildLookup();
  hasChanges = false;
  document.getElementById('save-bar').style.display = 'none';
  for (const [key, layer] of Object.entries(allLayers)) {
    const info = lookup[key];
    if (info) layer.setStyle(styleFor(info, false, selectedLayer === layer));
  }
  if (activeSuburbKey) renderEditPanel(activeSuburbKey);
}

function downloadMap() {
  const src = document.documentElement.outerHTML;
  const newData = JSON.stringify(data);
  const updated = src.replace(/let SUBURB_DATA = \{[\s\S]*?\};/, 'let SUBURB_DATA = ' + newData + ';');
  const blob = new Blob([updated], { type: 'text/html' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'territory_map_updated.html';
  a.click();
  URL.revokeObjectURL(a.href);
  hasChanges = false;
  document.getElementById('save-bar').style.display = 'none';
}

// ── LEGEND ────────────────────────────────────────────────────────────────────
function buildLegend() {
  const repCount = {};
  for (const v of Object.values(data)) {
    for (const c of v.customers) repCount[c.rep] = (repCount[c.rep] || 0) + 1;
  }
  document.getElementById('rep-list').innerHTML = Object.keys(REP_COLORS).map(rep => {
    const col = repColor(rep);
    const isWhite = col === '#FFFFFF';
    const safeRep = rep.replace(/&/g,'&amp;').replace(/"/g,'&quot;');
    return `<div class="rep-row" data-rep="${safeRep}">
      <div class="rep-dot" style="background:${col};${isWhite ? 'border:1.5px solid #aaa;' : ''}"></div>
      <span class="rep-name">${rep}</span>
      <span class="rep-count">${repCount[rep] || 0}</span>
    </div>`;
  }).join('');
  document.getElementById('rep-list').querySelectorAll('.rep-row').forEach(el => {
    el.addEventListener('click', () => toggleRep(el, el.dataset.rep));
  });
}

function toggleRep(el, rep) {
  dimmed.has(rep) ? dimmed.delete(rep) : dimmed.add(rep);
  el.classList.toggle('dimmed', dimmed.has(rep));
  for (const [name, layer] of Object.entries(allLayers)) {
    const info = lookup[name];
    if (info && info.reps.includes(rep)) {
      layer.setStyle(styleFor(info, false, selectedLayer === layer));
    }
  }
}

// ── SEARCH ────────────────────────────────────────────────────────────────────
const searchEl = document.getElementById('search');
const resultsEl = document.getElementById('search-results');

searchEl.addEventListener('input', () => {
  const q = searchEl.value.trim().toLowerCase();
  if (!q) { resultsEl.style.display = 'none'; return; }
  const hits = [];
  for (const [sub, info] of Object.entries(data)) {
    if (sub.toLowerCase().includes(q)) hits.push({ label: sub, suburb: sub, type: 'Suburb' });
    for (const c of info.customers) {
      if (c.name.toLowerCase().includes(q)) hits.push({ label: c.name, suburb: sub, type: `Customer · ${sub}` });
    }
  }
  if (!hits.length) { resultsEl.innerHTML = '<div class="sr-item" style="color:#666">No results</div>'; resultsEl.style.display='block'; return; }
  resultsEl.innerHTML = hits.slice(0,10).map(h =>
    `<div class="sr-item" onclick="jumpTo('${h.suburb.replace(/'/g,"\'")}')">${h.label}<br><span class="sr-type">${h.type}</span></div>`
  ).join('');
  resultsEl.style.display = 'block';
});

document.addEventListener('click', e => {
  if (!document.getElementById('search-wrap').contains(e.target)) resultsEl.style.display='none';
});

function jumpTo(suburb) {
  resultsEl.style.display = 'none';
  searchEl.value = '';
  const key = suburb.toUpperCase();
  const layer = allLayers[key];
  if (layer) {
    map.fitBounds(layer.getBounds(), { padding:[80,80] });
    layer.fire('click');
  } else {
    const info = lookup[key];
    if (info) { activeSuburbKey = key; renderViewPanel(info); }
  }
}

// ── VENUE FINDER (OpenStreetMap / Overpass API — free, no key needed) ────────
let venueMarkers = [];
let venueSuburbKey = null;

function showVenueButton(key) {
  venueSuburbKey = key;
  document.getElementById('venue-controls').style.display = 'block';
  const btn = document.getElementById('venue-btn');
  btn.disabled = false;
  btn.textContent = '🔍 Find nearby venues';
}

function hideVenueButton() {
  venueSuburbKey = null;
  document.getElementById('venue-controls').style.display = 'none';
}

function clearVenues() {
  venueMarkers.forEach(m => m.remove());
  venueMarkers = [];
  document.getElementById('clear-venues-btn').style.display = 'none';
  const btn = document.getElementById('venue-btn');
  if (btn) { btn.disabled = false; btn.textContent = '🔍 Find nearby venues'; }
}

async function findVenues() {
  if (!venueSuburbKey) return;
  const btn = document.getElementById('venue-btn');
  btn.disabled = true;
  btn.textContent = '⏳ Asking Claude…';

  const layer = allLayers[venueSuburbKey];
  if (!layer) { btn.textContent = '⚠ Suburb not on map'; btn.disabled = false; return; }

  const suburbName = venueSuburbKey.charAt(0) + venueSuburbKey.slice(1).toLowerCase();
  const center = layer.getBounds().getCenter();

  const prompt = `List up to 20 restaurants, cafes, bars, pubs, hotels, nightclubs, and bottle shops/wine shops in ${suburbName}, Victoria, Australia.

For each venue return ONLY a JSON array (no other text, no markdown) in this exact format:
[
  {"name": "Venue Name", "type": "restaurant", "address": "123 Example St", "lat": -37.1234, "lng": 144.5678},
  ...
]

Types must be one of: restaurant, cafe, bar, pub, hotel, nightclub, bottle shop, winery.
Coordinates must be real and accurate for ${suburbName} Victoria (near ${center.lat.toFixed(4)}, ${center.lng.toFixed(4)}).
Only include venues you are confident exist in ${suburbName} specifically. Return ONLY the JSON array.`;

  try {
    const resp = await fetch('https://anthropic-proxy.joshua-torney.workers.dev', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        model: 'claude-sonnet-4-20250514',
        max_tokens: 1000,
        messages: [{ role: 'user', content: prompt }]
      })
    });

    if (!resp.ok) throw new Error(`API error ${resp.status}`);
    const data = await resp.json();
    console.log('Worker response:', JSON.stringify(data));
    const text = data.content?.[0]?.text || '';
    console.log('Extracted text:', text);

    // Parse JSON from response
    const match = text.match(/\[[\s\S]*\]/);
    if (!match) throw new Error('No venue data returned');
    const venues = JSON.parse(match[0]);

    if (!venues.length) {
      btn.textContent = '⚠ No venues found';
      btn.disabled = false;
      return;
    }

    clearVenues();
    venues.forEach(v => {
      if (!v.lat || !v.lng || !v.name) return;
      const icon = L.divIcon({
        className: '',
        html: '<div class="venue-dot"></div>',
        iconSize: [14,14], iconAnchor: [7,7],
      });
      const marker = L.marker([v.lat, v.lng], { icon }).addTo(map);
      marker.bindPopup(`
        <div class="venue-popup">
          <strong>${v.name}</strong>
          <span class="vtype">${v.type}</span>
          ${v.address ? `<div>${v.address}</div>` : ''}
        </div>`);
      venueMarkers.push(marker);
    });

    btn.textContent = `✓ ${venueMarkers.length} venues found`;
    document.getElementById('clear-venues-btn').style.display = 'block';
  } catch(err) {
    btn.textContent = '⚠ Failed: ' + err.message;
    btn.disabled = false;
    console.error('Venue search error:', err);
  }
}

// ── LOAD GEOJSON ──────────────────────────────────────────────────────────────
async function loadGeoJSON() {
  const urls = [
    'https://raw.githubusercontent.com/tonywr71/GeoJson-Data/master/suburb-2-vic.geojson',
    'https://raw.githubusercontent.com/tonywr71/GeoJson-Data/master/australian-suburbs.geojson',
  ];
  for (const url of urls) {
    try {
      const r = await fetch(url);
      if (!r.ok) continue;
      return await r.json();
    } catch(e) { continue; }
  }
  throw new Error('Could not load suburb boundaries');
}

loadGeoJSON().then(geojson => {
  if (geojson.features?.length) {
    const dbg = document.getElementById('debug-bar');
    dbg.style.display = 'block';
    dbg.textContent = 'GeoJSON props: ' + Object.keys(geojson.features[0].properties).join(', ');
  }

  const geoLayer = L.geoJSON(geojson, {
    style: f => {
      const info = lookup[getSuburbName(f.properties).toUpperCase().trim()];
      return info
        ? styleFor(info, false, false)
        : { fillColor:'#333', fillOpacity:0.15, color:'#555', weight:0.5, opacity:0.5 };
    },
    onEachFeature: (feature, layer) => {
      const raw = getSuburbName(feature.properties).trim();
      const key = raw.toUpperCase();
      const info = lookup[key];
      allLayers[key] = layer;

      layer.on('mouseover', () => {
        if (selectedLayer !== layer) {
          if (info) { layer.setStyle(styleFor(info, true, false)); renderViewPanel(info); }
          else {
            layer.setStyle({ fillColor:'#aaa', fillOpacity:0.3, color:'#fff', weight:1.5 });
            document.getElementById('view-panel').innerHTML = `<h2>${raw}</h2><div class="placeholder" style="margin-top:12px">No customers in this suburb</div>`;
          }
          // Always show view panel on hover
          document.getElementById('view-panel').style.display = 'block';
          document.getElementById('edit-panel').style.display = 'none';
        }
      });

      layer.on('mouseout', () => {
        if (selectedLayer !== layer) {
          if (info) layer.setStyle(styleFor(info, false, false));
          else layer.setStyle({ fillColor:'#333', fillOpacity:0.15, color:'#555', weight:0.5, opacity:0.5 });
          clearViewPanel();
          // Restore mode panels
          document.getElementById('view-panel').style.display = currentMode === 'view' ? 'block' : 'none';
          document.getElementById('edit-panel').style.display = currentMode === 'edit' ? 'block' : 'none';
        }
      });

      layer.on('click', () => {
        const wasSelected = selectedLayer === layer;
        // Deselect previous
        if (selectedLayer && selectedLayer !== layer) {
          const prevKey = getSuburbName(selectedLayer.feature.properties).toUpperCase();
          const prevInfo = lookup[prevKey];
          if (prevInfo) selectedLayer.setStyle(styleFor(prevInfo, false, false));
          else selectedLayer.setStyle({ fillColor:'#333', fillOpacity:0.15, color:'#555', weight:0.5, opacity:0.5 });
        }
        if (wasSelected) {
          // Deselect
          selectedLayer = null;
          activeSuburbKey = null;
          if (info) layer.setStyle(styleFor(info, false, false));
          else layer.setStyle({ fillColor:'#333', fillOpacity:0.15, color:'#555', weight:0.5, opacity:0.5 });
          hideVenueButton();
          clearVenues();
          setMode('view');
          clearViewPanel();
        } else {
          // Select
          selectedLayer = layer;
          activeSuburbKey = key;
          if (info) layer.setStyle(styleFor(info, false, true));
          else layer.setStyle({ fillColor:'#aaa', fillOpacity:0.4, color:'#fff', weight:2 });
          showVenueButton(key);
          setMode('edit');
          if (info) renderEditPanel(key);
          else document.getElementById('edit-panel').innerHTML = `<h2>${raw}</h2><div class="placeholder" style="margin-top:12px">No customers yet.<br>Use the form below to add one.</div>`;
        }
      });
    }
  }).addTo(map);

  document.getElementById('loader').style.display = 'none';
  buildLegend();

  const totalCustomers = Object.values(data).reduce((s,v) => s + v.customers.length, 0);
  const sharedCount = Object.values(data).filter(v => v.reps.length > 1).length;
  const mappedCount = Object.keys(allLayers).length;
  document.getElementById('stats-line').innerHTML =
    `<span class="stat-pill">${totalCustomers} customers</span><span class="stat-pill">${sharedCount} shared suburbs</span><span class="stat-pill">11 reps</span>`;

  if (geoLayer.getBounds().isValid()) map.fitBounds(geoLayer.getBounds(), { padding:[20,20] });

}).catch(err => {
  document.getElementById('loader').innerHTML = `
    <h2 style="color:#e94560">⚠ Map Load Failed</h2>
    <p>Could not fetch suburb boundaries. Check your internet connection.</p>
    <button onclick="location.reload()" style="margin-top:16px;padding:10px 24px;background:#e94560;color:#fff;border:none;border-radius:6px;cursor:pointer;font-size:14px">↺ Retry</button>`;
});
</script>
